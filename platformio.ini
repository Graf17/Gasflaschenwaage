[env:adafruit_feather_esp32c6]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
; Fallback: Adafruit Feather ESP32-C6 ist in manchen PlatformIO-Versionen
; noch nicht als eigene Board-ID enthalten. Für reinen Sensor-Test funktioniert
; der generische ESP32-C6 DevKitC Build zuverlässig.
board = esp32-c6-devkitc-1
framework = arduino
monitor_speed = 115200
monitor_filters = default, time

lib_deps =
  bogde/HX711 @ ^0.7.5
  adafruit/Adafruit MAX1704X @ ^1.0.3

; Passe die Pins an deine Verdrahtung an.
build_flags =
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1
  ; Feather ESP32-C6: DOUT -> TX, SCK -> RX
  ; TX=GPIO16, RX=GPIO17
  -D HX711_DOUT_PIN=16
  -D HX711_SCK_PIN=17
  -D HX711_SCALE=22005.666016f
  ; Tara/Parameter als feste Konfiguration (statt serieller Eingabe)
  ; Leergewicht der Gasflasche in kg (ohne Gas)
  -D BOTTLE_EMPTY_KG=6.6f
  ; Nenn-Fuellmenge der Flasche in kg (z. B. 5 kg oder 11 kg)
  -D GAS_NOMINAL_KG=5.0f
  ; Feather interne Akku-Auslese (MAX17048 ueber I2C)
  -D FEATHER_I2C_SDA_PIN=19
  -D FEATHER_I2C_SCL_PIN=18
  -D FEATHER_I2C_POWER_PIN=20
  -D BATTERY_UPDATE_MS=10000UL
